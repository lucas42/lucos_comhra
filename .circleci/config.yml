version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/python:3.14
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r agent/requirements-test.txt
      - run:
          name: Run tests
          command: cd agent && pytest
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - lucos/build-amd64:
          serial-group: << pipeline.project.slug >>/build
      - lucos/deploy-avalon:
          serial-group: << pipeline.project.slug >>/deploy-avalon
          requires:
            - test
            - lucos/build-amd64
          filters:
            branches:
              only:
                - main
